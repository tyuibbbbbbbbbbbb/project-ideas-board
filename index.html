<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>לוח הרעיונות | Project Ideas Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-gold">לוח</span> הרעיונות
  </div>
  <div id="authArea" class="auth-area">
    <button id="loginBtn" class="btn btn-ghost">התחברות</button>
    <button id="registerBtn" class="btn btn-gold">הרשמה</button>
    <div id="userBox" class="user-box hidden">
      <span id="userName"></span>
      <button id="logoutBtn" class="btn btn-ghost small">התנתקות</button>
    </div>
  </div>
</header>

<main class="container">
  <section class="hero">
    <h1>יש לך רעיון לפרויקט אבל אין לך זמן או ידע לפתח אותו?</h1>
    <p>העלה אותו כאן. מפתחים אחרים שמחפשים על מה לעבוד יוכלו לאמץ אותו.
       הרעיונות עם הכי הרבה תמיכה עולים למעלה, ורעיונות עם יותר מ-10 דיסלייקים עוברים לבדיקה.</p>
    <button id="newIdeaBtn" class="btn btn-gold large">פרסם רעיון חדש +</button>
  </section>

  <section class="filters">
    <button class="filter-btn active" data-filter="all">הכל</button>
    <button class="filter-btn" data-filter="open">פתוחים לאימוץ</button>
    <button class="filter-btn" data-filter="taken">נלקחו</button>
    <button class="filter-btn" data-filter="done">בוצע</button>
    <button class="filter-btn" data-filter="saved">השמורים שלי</button>
  </section>

  <section id="ideasGrid" class="ideas-grid">
    <div class="loading">טוען רעיונות...</div>
  </section>
</main>

<!-- Modal: New Idea -->
<div id="ideaModal" class="modal hidden">
  <div class="modal-card">
    <button class="modal-close" data-close="ideaModal">&times;</button>
    <h2>פרסום רעיון חדש</h2>
    <form id="ideaForm">
      <label>כותרת הרעיון</label>
      <input type="text" id="ideaTitle" required maxlength="80" placeholder="לדוגמה: אפליקציה למעקב הוצאות משותפות" />
      <label>תיאור מלא</label>
      <textarea id="ideaDesc" required maxlength="2000" rows="6" placeholder="תאר את הרעיון, למי הוא מיועד ומה הוא אמור לפתור..."></textarea>
      <label>תגית תחום (אופציונלי)</label>
      <input type="text" id="ideaTag" maxlength="30" placeholder="לדוגמה: אתרים / אפליקציות / AI" />
      <button type="submit" class="btn btn-gold full">פרסם רעיון</button>
    </form>
  </div>
</div>

<!-- Modal: Auth -->
<div id="authModal" class="modal hidden">
  <div class="modal-card">
    <button class="modal-close" data-close="authModal">&times;</button>
    <h2 id="authModalTitle">התחברות</h2>
    <form id="authForm">
      <div id="registerFields" class="hidden">
        <label>שם מלא</label>
        <input type="text" id="fullName" maxlength="60" placeholder="שם מלא" />
        <label>שם משתמש בפורום</label>
        <input type="text" id="forumUsername" maxlength="40" placeholder="שם משתמש בפורום" />
      </div>
      <label>אימייל</label>
      <input type="email" id="authEmail" required placeholder="you@example.com" />
      <label>סיסמה</label>
      <input type="password" id="authPassword" required minlength="6" placeholder="לפחות 6 תווים" />
      <button type="submit" id="authSubmitBtn" class="btn btn-gold full">התחבר</button>
      <p id="authError" class="error-text hidden"></p>
      <p class="auth-switch">
        <span id="authSwitchText">אין לך חשבון?</span>
        <a href="#" id="authSwitchLink">הרשם עכשיו</a>
      </p>
    </form>
  </div>
</div>

<!-- Idea detail modal -->
<div id="detailModal" class="modal hidden">
  <div class="modal-card wide">
    <button class="modal-close" data-close="detailModal">&times;</button>
    <div id="detailContent"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
